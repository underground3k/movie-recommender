<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie recommender</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      /* card hover effect (can't do :hover in inline styles) */
      .movie-card:hover {
        transform: translateY(-3px);
        border-color: var(--border-hover) !important;
      }
      .movie-card:hover img {
        transform: scale(1.04);
      }
      .rating-item:hover {
        background: var(--surface-2) !important;
      }
      .nav-link:hover {
        color: var(--text-primary) !important;
      }
      .btn-ghost:hover {
        border-color: var(--border-hover) !important;
        color: var(--text-primary) !important;
      }
      .btn-accent:hover {
        opacity: 0.88;
      }
      .back-btn:hover {
        border-color: var(--border-hover) !important;
        color: var(--text-primary) !important;
      }
      .page-btn:hover:not(:disabled) {
        border-color: var(--border-hover) !important;
        color: var(--text-primary) !important;
      }
      .dropdown-item:hover {
        background: var(--surface-2) !important;
      }
      input::placeholder {
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
